<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--primary);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: var(--font-body);
        position: relative; overflow: hidden;
    }}

    .bg {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 80% 60% at 50% 50%, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 70%),
            radial-gradient(ellipse 50% 50% at 20% 80%, color-mix(in srgb, var(--secondary) 20%, transparent) 0%, transparent 60%),
            linear-gradient(145deg, var(--primary) 0%, var(--secondary) 100%);
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    /* Subtle geometric grid */
    .grid-deco {{
        position: absolute; inset: 60px;
        border: 1px solid rgba(255,255,255,0.04);
        z-index: 1; pointer-events: none;
    }}
    .grid-deco::before {{
        content: ""; position: absolute;
        top: 50%; left: 0; right: 0; height: 1px;
        background: rgba(255,255,255,0.03);
    }}
    .grid-deco::after {{
        content: ""; position: absolute;
        left: 50%; top: 0; bottom: 0; width: 1px;
        background: rgba(255,255,255,0.03);
    }}

    .content {{
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 36px; z-index: 2; padding: 80px; text-align: center;
    }}

    .logo-wrap {{ display: flex; align-items: center; justify-content: center; }}
    .logo-wrap img {{
        height: 120px; object-fit: contain;
        filter: brightness(0) invert(1);
        drop-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 72px;
        font-weight: 900; color: var(--text-light);
        letter-spacing: -0.02em; line-height: 1;
    }}

    .divider {{
        width: 56px; height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }}

    .tagline {{
        font-family: var(--font-body); font-size: clamp(22px, 3vw, 28px);
        font-weight: 300; color: rgba(255,255,255,0.65);
        max-width: 580px; line-height: 1.45; letter-spacing: 0.01em;
    }}

    .cta-btn {{
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 16px;
        font-weight: 700; padding: 16px 48px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        box-shadow: 0 8px 32px color-mix(in srgb, var(--accent) 30%, transparent);
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.1; z-index: 0;
    }}
</style>
</head>
<body>
    <div class="bg"></div>
    {hero_image_html}
    <div class="noise"></div>
    <div class="grid-deco"></div>

    <div class="content">
        <div class="logo-wrap">{logo_html}</div>
        <div class="divider"></div>
        <p class="tagline">{headline}</p>
        <div class="cta-btn">{cta}</div>
    </div>
</body>
</html>
