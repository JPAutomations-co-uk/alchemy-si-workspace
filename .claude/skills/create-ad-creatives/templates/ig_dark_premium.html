<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: #0b0b0b;
        font-family: var(--font-body);
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    /* Accent glow center */
    .glow {{
        position: absolute; width: 600px; height: 600px;
        border-radius: 50%; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, color-mix(in srgb, var(--accent) 7%, transparent) 0%, transparent 65%);
        pointer-events: none; z-index: 1;
    }}

    /* Thin accent lines top/bottom */
    .line-top {{
        position: absolute; top: 6px; left: 40px; right: 40px;
        height: 1px; background: var(--accent); opacity: 0.2; z-index: 2;
    }}
    .line-bottom {{
        position: absolute; bottom: 6px; left: 40px; right: 40px;
        height: 1px; background: var(--accent); opacity: 0.2; z-index: 2;
    }}

    /* Corner brackets */
    .corner-tl, .corner-br {{
        position: absolute; width: 40px; height: 40px; z-index: 2;
    }}
    .corner-tl {{
        top: 28px; left: 28px;
        border-top: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        border-left: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    }}
    .corner-br {{
        bottom: 28px; right: 28px;
        border-bottom: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        border-right: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    }}

    .logo-wrap {{
        position: absolute; top: 56px; left: 50%;
        transform: translateX(-50%); z-index: 3;
    }}
    .logo-wrap img {{
        height: 34px; object-fit: contain; opacity: 0.6;
        filter: brightness(0) invert(1);
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 16px;
        font-weight: 700; color: rgba(255,255,255,0.4);
        letter-spacing: 0.2em; text-transform: uppercase;
    }}

    .content {{
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 120px 100px; gap: 28px; z-index: 3;
    }}

    .headline {{
        font-family: var(--font-heading); font-size: clamp(42px, 6vw, 58px);
        font-weight: 900; color: var(--text-light);
        letter-spacing: -0.01em; line-height: 1.1; max-width: 800px;
    }}

    .dot-sep {{
        font-size: 16px; color: var(--accent);
        letter-spacing: 14px; opacity: 0.7;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 21px;
        font-weight: 300; color: rgba(255,255,255,0.5);
        max-width: 580px; line-height: 1.55;
    }}

    .cta-btn {{
        border: 1px solid var(--accent); background: transparent;
        color: var(--accent);
        font-family: var(--font-heading); font-size: 15px;
        font-weight: 700; padding: 14px 44px; border-radius: 3px;
        letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.08; z-index: 0;
    }}
</style>
</head>
<body>
    {hero_image_html}
    <div class="noise"></div>
    <div class="glow"></div>
    <div class="line-top"></div>
    <div class="line-bottom"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="logo-wrap">{logo_html}</div>

    <div class="content">
        <h1 class="headline">{headline}</h1>
        <div class="dot-sep">&bull; &bull; &bull;</div>
        <p class="subheadline">{subheadline}</p>
        <div class="cta-btn">{cta}</div>
    </div>
</body>
</html>
