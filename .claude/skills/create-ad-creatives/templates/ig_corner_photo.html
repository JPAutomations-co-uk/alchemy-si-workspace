<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--bg);
        font-family: var(--font-body);
        position: relative; overflow: hidden;
    }}

    /* Subtle noise */
    .noise {{
        position: absolute; inset: 0; opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 5;
    }}

    /* Corner image — top right with diagonal clip */
    .corner-image {{
        position: absolute; top: 0; right: 0;
        width: 62%; height: 62%;
        clip-path: polygon(12% 0, 100% 0, 100% 100%, 0 88%);
        overflow: hidden; z-index: 1;
        background: linear-gradient(145deg, var(--secondary) 0%, color-mix(in srgb, var(--secondary) 60%, var(--primary)) 100%);
    }}

    .corner-image .hero-img {{
        position: absolute; inset: 0;
        width: 100%; height: 100%; object-fit: cover;
    }}

    /* Fade edges into bg */
    .corner-fade-bottom {{
        position: absolute; bottom: 0; left: 0; right: 0;
        height: 180px;
        background: linear-gradient(to top, var(--bg), transparent);
        z-index: 2;
    }}
    .corner-fade-left {{
        position: absolute; top: 0; bottom: 0; left: 0;
        width: 180px;
        background: linear-gradient(to right, var(--bg), transparent);
        z-index: 2;
    }}

    /* Accent glow behind photo */
    .accent-glow {{
        position: absolute; top: 10%; right: 5%;
        width: 400px; height: 400px; border-radius: 50%;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 60%);
        pointer-events: none; z-index: 0;
    }}

    /* Decorative accent line */
    .accent-line {{
        position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
        background: linear-gradient(to bottom, var(--accent), transparent 70%);
        z-index: 3;
    }}

    /* Main content — bottom left */
    .main-content {{
        position: absolute;
        bottom: 64px; left: 72px;
        max-width: 580px; z-index: 4;
        display: flex; flex-direction: column; gap: 16px;
    }}

    .eyebrow {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 600; color: var(--accent);
        letter-spacing: 0.22em; text-transform: uppercase;
        display: flex; align-items: center; gap: 8px;
    }}
    .eyebrow::before {{
        content: ""; width: 20px; height: 1.5px; background: var(--accent);
    }}

    .headline {{
        font-family: var(--font-heading);
        font-size: clamp(36px, 5vw, 48px);
        font-weight: 900; color: var(--text-dark);
        line-height: 1.08; letter-spacing: -0.01em;
    }}

    .accent-bar {{
        width: 48px; height: 3px;
        background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
        border-radius: 2px;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 17px;
        font-weight: 400;
        color: color-mix(in srgb, var(--text-dark) 55%, transparent);
        line-height: 1.5; max-width: 460px;
    }}

    .cta-btn {{
        display: inline-block;
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 16px;
        font-weight: 700; padding: 14px 38px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        width: fit-content;
        box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 25%, transparent);
    }}

    .logo-bottom {{
        position: absolute; bottom: 40px; right: 56px; z-index: 4;
    }}
    .logo-bottom img {{
        height: 26px; object-fit: contain; opacity: 0.35;
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 12px;
        font-weight: 700;
        color: color-mix(in srgb, var(--text-dark) 35%, transparent);
        letter-spacing: 0.1em; text-transform: uppercase;
    }}
</style>
</head>
<body>
    <div class="noise"></div>
    <div class="accent-glow"></div>
    <div class="accent-line"></div>

    <div class="corner-image">
        {hero_image_html}
        <div class="corner-fade-bottom"></div>
        <div class="corner-fade-left"></div>
    </div>

    <div class="main-content">
        <div class="eyebrow">{brand_name}</div>
        <h1 class="headline">{headline}</h1>
        <div class="accent-bar"></div>
        <p class="subheadline">{subheadline}</p>
        <div class="cta-btn">{cta}</div>
    </div>

    <div class="logo-bottom">
        {logo_html}
    </div>
</body>
</html>
