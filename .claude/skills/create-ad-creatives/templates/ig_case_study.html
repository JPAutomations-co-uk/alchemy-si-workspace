<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        font-family: var(--font-body);
        display: flex; flex-direction: column;
        padding: 52px 64px;
        position: relative; overflow: hidden;
    }}

    .bg-layer {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 60% 40% at 80% 90%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 60%),
            linear-gradient(155deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 80%, var(--secondary)) 100%);
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.06; z-index: 0;
    }}

    .top-bar {{
        display: flex; align-items: center;
        justify-content: space-between;
        margin-bottom: 32px; z-index: 2;
    }}

    .case-study-badge {{
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 12px;
        font-weight: 800; letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 8px 22px; border-radius: 100px;
        box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 25%, transparent);
    }}

    .logo-wrap {{ display: flex; align-items: center; }}
    .logo-wrap img {{
        height: 26px; object-fit: contain;
        filter: brightness(0) invert(1); opacity: 0.6;
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 13px;
        font-weight: 700; color: rgba(255,255,255,0.4);
        letter-spacing: 0.1em; text-transform: uppercase;
    }}

    .headline {{
        font-family: var(--font-heading);
        font-size: clamp(28px, 3.8vw, 36px);
        font-weight: 900; color: var(--text-light);
        margin-bottom: 24px; z-index: 2;
        line-height: 1.15; max-width: 90%;
    }}

    .case-rows {{
        flex: 1; display: flex; flex-direction: column;
        gap: 4px; z-index: 2; margin-bottom: 28px;
    }}

    /* Styles for injected case_rows_html */
    .case-row {{
        flex: 1; padding: 18px 28px;
        display: flex; flex-direction: column;
        justify-content: center; gap: 5px;
        border-radius: 6px;
    }}

    .case-row-problem {{
        background: color-mix(in srgb, #5a0000 25%, color-mix(in srgb, var(--primary) 75%, transparent));
        border-left: 3px solid #8a2020;
    }}

    .case-row-solution {{
        background: rgba(255,255,255,0.05);
        border-left: 3px solid rgba(255,255,255,0.15);
    }}

    .case-row-result {{
        background: color-mix(in srgb, var(--accent) 15%, transparent);
        border-left: 3px solid var(--accent);
    }}

    .case-row-label {{
        font-family: var(--font-body); font-size: 10px;
        font-weight: 700; letter-spacing: 0.24em;
        text-transform: uppercase; color: rgba(255,255,255,0.4);
    }}

    .case-row-text {{
        font-family: var(--font-body); font-size: 17px;
        font-weight: 400; color: var(--text-light);
        line-height: 1.4;
    }}

    .case-row-result .case-row-label {{
        color: color-mix(in srgb, var(--accent) 70%, white);
    }}

    .case-row-result .case-row-text {{
        color: var(--accent); font-weight: 700;
        font-size: 19px;
    }}

    .cta-btn {{
        display: inline-block;
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 16px;
        font-weight: 700; padding: 14px 40px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        z-index: 2; width: fit-content;
        box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 30%, transparent);
    }}
</style>
</head>
<body>
    <div class="bg-layer"></div>
    {hero_image_html}
    <div class="noise"></div>

    <div class="top-bar">
        <div class="case-study-badge">Case Study</div>
        <div class="logo-wrap">{logo_html}</div>
    </div>

    <h1 class="headline">{headline}</h1>

    <div class="case-rows">
        {case_rows_html}
    </div>

    <div class="cta-btn">{cta}</div>
</body>
</html>
