<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={width}, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@400;600;700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
        :root {{
            --primary: {primary_color};
            --secondary: {secondary_color};
            --accent: {accent_color};
            --text-light: {text_light};
            --text-dark: {text_dark};
            --bg: {bg_color};
            --font-heading: '{heading_font}', 'Inter', sans-serif;
            --font-body: '{body_font}', 'Inter', sans-serif;
        }}
        html, body {{
            width: {width}px;
            height: {height}px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }}
        .ad {{
            width: {width}px;
            height: {height}px;
            background: linear-gradient(160deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 72px;
            position: relative;
            overflow: hidden;
        }}

        /* Decorative accent circle */
        .ad::before {{
            content: "";
            position: absolute;
            top: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.12;
        }}

        .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(48px, 7vw, 72px);
            line-height: 1.05;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }}

        .subheadline {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(20px, 3vw, 28px);
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 48px;
            max-width: 80%;
            position: relative;
            z-index: 1;
        }}

        .cta-button {{
            display: inline-block;
            padding: 20px 52px;
            background: var(--accent);
            color: var(--text-light);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 6px;
            border: none;
            position: relative;
            z-index: 1;
        }}

        .logo {{
            position: absolute;
            bottom: 48px;
            left: 72px;
            height: 32px;
            opacity: 0.6;
        }}

        .brand-name {{
            position: absolute;
            bottom: 48px;
            left: 72px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }}
    </style>
</head>
<body>
    <div class="ad">
        <div class="headline">{headline}</div>
        <div class="subheadline">{subheadline}</div>
        <div class="cta-button">{cta}</div>
        {logo_html}
        <div class="brand-name">{brand_name}</div>
    </div>
</body>
</html>
