<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={width}, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@400;600;700;800;900&family={body_font_encoded}:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
        :root {{
            --primary: {primary_color};
            --secondary: {secondary_color};
            --accent: {accent_color};
            --text-light: {text_light};
            --text-dark: {text_dark};
            --bg: {bg_color};
            --font-heading: '{heading_font}', 'Inter', sans-serif;
            --font-body: '{body_font}', 'Inter', sans-serif;
        }}
        html, body {{
            width: {width}px;
            height: {height}px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }}
        .ad {{
            width: {width}px;
            height: {height}px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 72px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }}

        /* Top accent stripe */
        .ad::before {{
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--accent);
        }}

        .quote-mark {{
            font-family: Georgia, serif;
            font-size: 140px;
            line-height: 0.5;
            color: var(--accent);
            opacity: 0.3;
            margin-bottom: 24px;
        }}

        .quote {{
            font-family: var(--font-body);
            font-weight: 400;
            font-style: italic;
            font-size: clamp(24px, 3.5vw, 36px);
            line-height: 1.45;
            color: var(--text-dark);
            margin-bottom: 36px;
            max-width: 90%;
        }}

        .stars {{
            font-size: 28px;
            color: #FFD700;
            letter-spacing: 6px;
            margin-bottom: 28px;
        }}

        .attribution {{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }}

        .customer-name {{
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            color: var(--text-dark);
            letter-spacing: 0.04em;
        }}

        .customer-title {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 15px;
            color: #888;
        }}

        .divider {{
            width: 40px;
            height: 2px;
            background: var(--accent);
            margin: 28px 0;
            opacity: 0.5;
        }}

        .cta {{
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
        }}

        .brand-name {{
            position: absolute;
            bottom: 48px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.2);
        }}
    </style>
</head>
<body>
    <div class="ad">
        <div class="quote-mark">&ldquo;</div>
        <div class="quote">{headline}</div>
        <div class="stars">{stars_html}</div>
        <div class="attribution">
            <div class="customer-name">{customer_name}</div>
            <div class="customer-title">{customer_title}</div>
        </div>
        <div class="divider"></div>
        <div class="cta">{cta}</div>
        <div class="brand-name">{brand_name}</div>
    </div>
</body>
</html>
