<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--bg);
        font-family: var(--font-body);
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        justify-content: center;
        padding: 80px 88px;
    }}

    /* Subtle noise */
    .noise {{
        position: absolute; inset: 0; opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.04; z-index: 0;
    }}

    /* Large decorative quote mark */
    .quote-mark {{
        position: absolute; top: 40px; left: 64px;
        font-family: var(--font-heading); font-size: 240px;
        font-weight: 900; line-height: 1; z-index: 0;
        background: linear-gradient(180deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 15%, transparent) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; opacity: 0.12;
        user-select: none;
    }}

    /* Soft glow */
    .bg-glow {{
        position: absolute; bottom: -50px; right: -50px;
        width: 400px; height: 400px; border-radius: 50%;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent) 4%, transparent) 0%, transparent 70%);
        pointer-events: none;
    }}

    /* Accent top line */
    .accent-top {{
        position: absolute; top: 0; left: 80px; right: 80px; height: 3px;
        background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 20%, transparent));
        z-index: 2;
    }}

    .content {{
        display: flex; flex-direction: column;
        gap: 28px; z-index: 2;
    }}

    .stars {{
        display: flex; gap: 6px;
    }}
    .star {{
        width: 22px; height: 22px;
    }}

    .quote-text {{
        font-family: var(--font-body);
        font-style: italic; font-size: clamp(24px, 3.2vw, 30px);
        font-weight: 400; color: var(--text-dark);
        line-height: 1.45; max-width: 85%;
    }}

    .accent-line {{
        width: 48px; height: 2px;
        background: var(--accent); border-radius: 1px;
    }}

    .attribution {{
        display: flex; flex-direction: column; gap: 4px;
    }}

    .customer-name {{
        font-family: var(--font-heading); font-size: 18px;
        font-weight: 800; color: var(--text-dark);
        letter-spacing: 0.01em;
    }}

    .customer-title {{
        font-family: var(--font-body); font-size: 14px;
        font-weight: 400;
        color: color-mix(in srgb, var(--text-dark) 45%, transparent);
    }}

    .bottom-row {{
        display: flex; align-items: center;
        justify-content: space-between;
        margin-top: 12px;
    }}

    .cta-text {{
        font-family: var(--font-heading); font-size: 14px;
        font-weight: 700; color: var(--accent);
        letter-spacing: 0.14em; text-transform: uppercase;
        display: flex; align-items: center; gap: 10px;
    }}
    .cta-text::after {{
        content: ""; width: 24px; height: 1.5px; background: var(--accent);
    }}

    .logo-wrap img {{
        height: 28px; object-fit: contain; opacity: 0.35;
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 13px;
        font-weight: 700;
        color: color-mix(in srgb, var(--text-dark) 30%, transparent);
        letter-spacing: 0.08em; text-transform: uppercase;
    }}
</style>
</head>
<body>
    {hero_image_html}
    <div class="noise"></div>
    <div class="quote-mark">"</div>
    <div class="bg-glow"></div>
    <div class="accent-top"></div>

    <div class="content">
        <div class="stars">
            <svg class="star" viewBox="0 0 22 22" fill="var(--accent)"><path d="M11 1l2.8 6.2L21 8.1l-5 4.6 1.4 7.3L11 16.5 4.6 20l1.4-7.3-5-4.6 7.2-.9z"/></svg>
            <svg class="star" viewBox="0 0 22 22" fill="var(--accent)"><path d="M11 1l2.8 6.2L21 8.1l-5 4.6 1.4 7.3L11 16.5 4.6 20l1.4-7.3-5-4.6 7.2-.9z"/></svg>
            <svg class="star" viewBox="0 0 22 22" fill="var(--accent)"><path d="M11 1l2.8 6.2L21 8.1l-5 4.6 1.4 7.3L11 16.5 4.6 20l1.4-7.3-5-4.6 7.2-.9z"/></svg>
            <svg class="star" viewBox="0 0 22 22" fill="var(--accent)"><path d="M11 1l2.8 6.2L21 8.1l-5 4.6 1.4 7.3L11 16.5 4.6 20l1.4-7.3-5-4.6 7.2-.9z"/></svg>
            <svg class="star" viewBox="0 0 22 22" fill="var(--accent)"><path d="M11 1l2.8 6.2L21 8.1l-5 4.6 1.4 7.3L11 16.5 4.6 20l1.4-7.3-5-4.6 7.2-.9z"/></svg>
        </div>

        <p class="quote-text">"{headline}"</p>

        <div class="accent-line"></div>

        <div class="attribution">
            <div class="customer-name">{customer_name}</div>
            <div class="customer-title">{customer_title}</div>
        </div>

        <div class="bottom-row">
            <div class="cta-text">{cta}</div>
            <div class="logo-wrap">{logo_html}</div>
        </div>
    </div>
</body>
</html>
