<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={width}, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@400;600;700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
        :root {{
            --primary: {primary_color};
            --secondary: {secondary_color};
            --accent: {accent_color};
            --text-light: {text_light};
            --text-dark: {text_dark};
            --bg: {bg_color};
            --font-heading: '{heading_font}', 'Inter', sans-serif;
            --font-body: '{body_font}', 'Inter', sans-serif;
        }}
        html, body {{
            width: {width}px;
            height: {height}px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }}
        .slide {{
            width: {width}px;
            height: {height}px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 72px;
            position: relative;
            overflow: hidden;
        }}

        /* === HOOK: BIG QUOTE === */
        .slide-hook {{
            background: var(--primary);
            align-items: center;
            text-align: center;
        }}
        .slide-hook .quote-mark {{
            font-family: Georgia, serif;
            font-size: 180px;
            line-height: 0.6;
            color: var(--accent);
            opacity: 0.8;
            margin-bottom: 24px;
        }}
        .slide-hook .headline {{
            font-family: var(--font-body);
            font-weight: 400;
            font-style: italic;
            font-size: clamp(28px, 4vw, 40px);
            line-height: 1.4;
            color: var(--text-light);
            margin-bottom: 32px;
        }}
        .slide-hook .attribution {{
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }}

        /* === CONTEXT SLIDE === */
        .slide-context {{
            background: var(--bg);
            align-items: flex-start;
        }}
        .slide-context .tag {{
            display: inline-block;
            padding: 8px 20px;
            background: var(--primary);
            color: var(--text-light);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 32px;
        }}
        .slide-context .headline {{
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(32px, 4.5vw, 44px);
            line-height: 1.15;
            color: var(--text-dark);
            margin-bottom: 20px;
        }}
        .slide-context .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: #555;
        }}

        /* === CHALLENGE SLIDE === */
        .slide-challenge {{
            background: var(--secondary);
            align-items: flex-start;
        }}
        .slide-challenge .headline {{
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(36px, 5vw, 52px);
            line-height: 1.1;
            color: var(--text-light);
            margin-bottom: 20px;
        }}
        .slide-challenge .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
        }}

        /* === RESULT SLIDE === */
        .slide-result {{
            background: var(--bg);
            align-items: center;
            text-align: center;
        }}
        .slide-result .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(64px, 10vw, 96px);
            line-height: 1;
            color: var(--accent);
            margin-bottom: 20px;
        }}
        .slide-result .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(20px, 3vw, 28px);
            line-height: 1.4;
            color: var(--text-dark);
        }}

        /* === CTA SLIDE === */
        .slide-cta {{
            background: var(--accent);
            align-items: center;
            text-align: center;
        }}
        .slide-cta .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(36px, 5.5vw, 56px);
            line-height: 1.1;
            color: var(--text-light);
            margin-bottom: 24px;
        }}
        .slide-cta .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 32px;
        }}
        .slide-cta .stars {{
            font-size: 32px;
            color: #FFD700;
            letter-spacing: 4px;
            margin-bottom: 32px;
        }}
        .slide-cta .cta-button {{
            display: inline-block;
            padding: 18px 48px;
            border: 2px solid var(--text-light);
            color: var(--text-light);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
        }}

        /* === SHARED === */
        .logo {{ position: absolute; bottom: 40px; right: 48px; height: 28px; opacity: 0.7; }}
        .slide-indicator {{ position: absolute; bottom: 40px; left: 48px; display: flex; gap: 6px; }}
        .slide-indicator .dot {{ width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }}
        .slide-indicator .dot.active {{ background: rgba(255,255,255,0.9); width: 24px; border-radius: 4px; }}
        .slide-context .slide-indicator .dot,
        .slide-result .slide-indicator .dot {{ background: rgba(0,0,0,0.15); }}
        .slide-context .slide-indicator .dot.active,
        .slide-result .slide-indicator .dot.active {{ background: var(--primary); }}
    </style>
</head>
<body>
    <div class="slide {slide_class}">
        {slide_content}
    </div>
</body>
</html>
