<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--bg);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: var(--font-body);
        position: relative; overflow: hidden;
    }}

    .bg-texture {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse at 30% 20%, color-mix(in srgb, var(--accent) 5%, transparent) 0%, transparent 50%),
            radial-gradient(ellipse at 70% 80%, color-mix(in srgb, var(--primary) 6%, transparent) 0%, transparent 50%);
        pointer-events: none;
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.02;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none;
    }}

    /* Decorative corner brackets */
    .corner-tl, .corner-br {{
        position: absolute; width: 60px; height: 60px; z-index: 1;
    }}
    .corner-tl {{
        top: 40px; left: 40px;
        border-top: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
        border-left: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }}
    .corner-br {{
        bottom: 40px; right: 40px;
        border-bottom: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
        border-right: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }}

    .content {{
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px; z-index: 2; padding: 60px 80px;
    }}

    .badge {{
        width: 340px; height: 340px; border-radius: 50%;
        border: 2.5px solid var(--accent);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--accent) 3%, var(--bg));
        box-shadow:
            0 0 0 10px color-mix(in srgb, var(--accent) 8%, transparent),
            0 0 0 20px color-mix(in srgb, var(--accent) 4%, transparent),
            0 20px 60px color-mix(in srgb, var(--primary) 10%, transparent);
        position: relative;
    }}
    .badge::before {{
        content: ''; position: absolute; inset: 10px;
        border-radius: 50%;
        border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
    }}

    .checkmark-svg {{ margin-bottom: 12px; }}

    .badge-text {{
        font-family: var(--font-heading); font-size: 26px;
        font-weight: 800; color: var(--primary);
        letter-spacing: 0.08em; text-transform: uppercase;
    }}
    .badge-sub {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 500; color: var(--accent);
        letter-spacing: 0.22em; text-transform: uppercase; margin-top: 4px;
    }}

    .headline {{
        font-family: var(--font-heading); font-size: clamp(32px, 4.5vw, 42px);
        font-weight: 900; color: var(--text-dark);
        text-align: center; line-height: 1.15; max-width: 680px;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 19px;
        font-weight: 400; color: color-mix(in srgb, var(--text-dark) 55%, transparent);
        text-align: center; max-width: 560px; line-height: 1.55;
        margin-top: -8px;
    }}

    .logo {{
        position: absolute; bottom: 44px; left: 50%;
        transform: translateX(-50%); height: 32px;
        object-fit: contain; opacity: 0.5; z-index: 2;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.05; z-index: 0;
    }}
</style>
</head>
<body>
    <div class="bg-texture"></div>
    {hero_image_html}
    <div class="noise"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="content">
        <div class="badge">
            <svg class="checkmark-svg" width="72" height="72" viewBox="0 0 80 80" fill="none">
                <circle cx="40" cy="40" r="36" stroke="{accent_color}" stroke-width="2" fill="none" opacity="0.3"/>
                <polyline points="20,42 33,55 60,28" stroke="{accent_color}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <div class="badge-text">Guaranteed</div>
            <div class="badge-sub">100% Satisfaction</div>
        </div>

        <h1 class="headline">{headline}</h1>
        <p class="subheadline">{subheadline}</p>
    </div>

    {logo_html}
</body>
</html>
