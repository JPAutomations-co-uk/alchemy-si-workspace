<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--primary);
        font-family: var(--font-body);
    }}

    .ad {{
        width: {width}px;
        height: {height}px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px 80px;
    }}

    /* Multi-layer gradient background */
    .bg-base {{
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 60% at 20% 80%, color-mix(in srgb, var(--secondary) 50%, black) 0%, transparent 70%),
            radial-gradient(ellipse 60% 50% at 80% 20%, color-mix(in srgb, var(--accent) 15%, transparent) 0%, transparent 60%),
            linear-gradient(155deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 80%, var(--secondary)) 45%, var(--secondary) 100%);
    }}

    /* Noise texture overlay */
    .noise {{
        position: absolute;
        inset: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px;
        pointer-events: none;
        z-index: 1;
    }}

    /* Large decorative ring — top right */
    .deco-ring {{
        position: absolute;
        top: -140px;
        right: -100px;
        width: 480px;
        height: 480px;
        border-radius: 50%;
        border: 1.5px solid var(--accent);
        opacity: 0.12;
        z-index: 1;
    }}
    .deco-ring-inner {{
        position: absolute;
        top: -80px;
        right: -40px;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(circle, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 70%);
        z-index: 1;
    }}

    /* Grid dots pattern — bottom left */
    .deco-dots {{
        position: absolute;
        bottom: 100px;
        right: 60px;
        width: 120px;
        height: 120px;
        background-image: radial-gradient(circle, color-mix(in srgb, var(--accent) 25%, transparent) 1.5px, transparent 1.5px);
        background-size: 20px 20px;
        opacity: 0.4;
        z-index: 1;
    }}

    /* Thin accent line */
    .accent-line {{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 40%, transparent));
        z-index: 2;
    }}

    .content {{
        position: relative;
        z-index: 2;
    }}

    .eyebrow {{
        font-family: var(--font-body);
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        gap: 12px;
    }}
    .eyebrow::before {{
        content: "";
        width: 28px;
        height: 1.5px;
        background: var(--accent);
    }}

    .headline {{
        font-family: var(--font-heading);
        font-weight: 900;
        font-size: clamp(54px, 8.5vw, 92px);
        line-height: 0.98;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: -0.035em;
        margin-bottom: 36px;
        max-width: 90%;
    }}

    .accent-bar {{
        width: 56px;
        height: 4px;
        background: var(--accent);
        border-radius: 2px;
        margin-bottom: 28px;
    }}

    .subheadline {{
        font-family: var(--font-body);
        font-weight: 300;
        font-size: clamp(17px, 2.2vw, 23px);
        line-height: 1.55;
        color: rgba(255,255,255,0.55);
        max-width: 70%;
    }}

    /* Logo bottom-left */
    .logo {{
        position: absolute;
        bottom: 52px;
        left: 80px;
        height: 34px;
        opacity: 0.6;
        z-index: 2;
    }}
    .brand-name {{
        position: absolute;
        bottom: 56px;
        left: 80px;
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.2);
        z-index: 2;
    }}

    /* Optional hero image — positioned behind content with heavy overlay */
    .hero-img {{
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.15;
        z-index: 0;
    }}
</style>
</head>
<body>
<div class="ad">
    <div class="bg-base"></div>
    {hero_image_html}
    <div class="noise"></div>
    <div class="deco-ring"></div>
    <div class="deco-ring-inner"></div>
    <div class="deco-dots"></div>
    <div class="accent-line"></div>

    <div class="content">
        <div class="eyebrow">{brand_name}</div>
        <div class="headline">{headline}</div>
        <div class="accent-bar"></div>
        <div class="subheadline">{subheadline}</div>
    </div>

    {logo_html}
    <div class="brand-name">{brand_name}</div>
</div>
</body>
</html>
