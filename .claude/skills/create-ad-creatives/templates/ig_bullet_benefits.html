<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--bg);
        font-family: var(--font-body);
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        justify-content: center;
        padding: 72px 88px;
    }}

    /* Subtle gradient overlay top-right */
    .bg-gradient {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 50% 40% at 90% 10%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 70%),
            radial-gradient(ellipse 40% 40% at 10% 90%, color-mix(in srgb, var(--primary) 5%, transparent) 0%, transparent 70%);
        pointer-events: none;
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 0;
    }}

    /* Left accent bar with rounded cap */
    .accent-bar {{
        position: absolute; left: 0; top: 20%; bottom: 20%;
        width: 5px; border-radius: 0 3px 3px 0;
        background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 60%, var(--primary)));
        z-index: 1;
    }}

    .eyebrow {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 600; color: var(--accent);
        letter-spacing: 0.25em; text-transform: uppercase;
        margin-bottom: 14px; position: relative; z-index: 1;
        display: flex; align-items: center; gap: 10px;
    }}
    .eyebrow::before {{
        content: ""; width: 20px; height: 1.5px; background: var(--accent);
    }}

    .headline {{
        font-family: var(--font-heading); font-size: clamp(36px, 5vw, 48px);
        font-weight: 900; color: var(--text-dark);
        line-height: 1.1; max-width: 720px;
        margin-bottom: 44px; position: relative; z-index: 1;
    }}

    .bullets-list {{
        display: flex; flex-direction: column; gap: 24px;
        margin-bottom: 44px; position: relative; z-index: 1;
    }}

    /* Glassmorphism benefit rows */
    .benefit-row {{
        display: flex; align-items: center; gap: 20px;
        padding: 18px 24px;
        background: color-mix(in srgb, var(--primary) 4%, white);
        border: 1px solid color-mix(in srgb, var(--primary) 8%, transparent);
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }}

    .check-icon {{
        flex-shrink: 0; width: 36px; height: 36px;
        border-radius: 50%; background: var(--accent);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 12px color-mix(in srgb, var(--accent) 25%, transparent);
    }}
    .check-icon svg {{ width: 18px; height: 18px; color: white; }}

    .benefit-text {{
        font-family: var(--font-body); font-size: 19px;
        font-weight: 500; color: var(--text-dark); line-height: 1.35;
    }}

    .bottom-row {{
        display: flex; align-items: center;
        justify-content: space-between;
        position: relative; z-index: 1;
    }}

    .cta-btn {{
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 16px;
        font-weight: 700; padding: 15px 40px;
        border-radius: 8px; letter-spacing: 0.06em;
        text-transform: uppercase;
        box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 25%, transparent);
    }}

    .logo {{
        height: 32px; object-fit: contain; opacity: 0.6;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.06; z-index: 0;
    }}
</style>
</head>
<body>
    <div class="bg-gradient"></div>
    {hero_image_html}
    <div class="noise"></div>
    <div class="accent-bar"></div>

    <div class="eyebrow">{brand_name}</div>
    <h1 class="headline">{headline}</h1>

    <div class="bullets-list">
        {bullets_html}
    </div>

    <div class="bottom-row">
        <div class="cta-btn">{cta}</div>
        {logo_html}
    </div>
</body>
</html>
