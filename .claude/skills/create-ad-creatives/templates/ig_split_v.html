<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{ font-family: var(--font-body); display: flex; flex-direction: row; overflow: hidden; }}

    .left-image {{
        flex: 0 0 45%; position: relative; overflow: hidden;
        background: linear-gradient(145deg, var(--secondary) 0%, var(--primary) 100%);
    }}
    .left-image .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }}
    .image-fade {{
        position: absolute; top: 0; right: 0; bottom: 0; width: 80px;
        background: linear-gradient(to right, transparent, var(--primary)); z-index: 1;
    }}

    .right-content {{
        flex: 0 0 55%; position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        justify-content: center; padding: 56px 48px; gap: 0;
    }}

    .right-bg {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 50% 60% at 70% 40%, color-mix(in srgb, var(--accent) 5%, transparent) 0%, transparent 70%),
            linear-gradient(160deg, var(--primary) 0%, var(--secondary) 100%);
    }}

    .right-noise {{
        position: absolute; inset: 0; opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none;
    }}

    .accent-bar {{
        position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
        background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent));
        z-index: 1;
    }}

    .logo {{ height: 28px; object-fit: contain; opacity: 0.7; filter: brightness(0) invert(1); position: relative; z-index: 1; margin-bottom: 20px; }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 13px; font-weight: 700;
        color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase;
    }}

    .headline {{
        font-family: var(--font-heading); font-size: clamp(26px, 3.5vw, 42px);
        font-weight: 900; color: var(--text-light);
        line-height: 1.1; margin-top: 16px; position: relative; z-index: 1;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 17px; font-weight: 300;
        color: rgba(255,255,255,0.55); line-height: 1.55;
        margin-top: 14px; max-width: 400px; position: relative; z-index: 1;
    }}

    .cta-btn {{
        display: inline-block; background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 15px; font-weight: 700;
        padding: 14px 36px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        margin-top: 28px; width: fit-content; position: relative; z-index: 1;
        box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 25%, transparent);
    }}
</style>
</head>
<body>
    <div class="left-image">
        {hero_image_html}
        <div class="image-fade"></div>
    </div>

    <div class="right-content">
        <div class="right-bg"></div>
        <div class="right-noise"></div>
        <div class="accent-bar"></div>
        {logo_html}
        <h1 class="headline">{headline}</h1>
        <p class="subheadline">{subheadline}</p>
        <div class="cta-btn">{cta}</div>
    </div>
</body>
</html>
