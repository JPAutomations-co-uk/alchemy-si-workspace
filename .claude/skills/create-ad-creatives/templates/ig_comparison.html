<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--primary);
        font-family: var(--font-body);
        display: flex; flex-direction: column;
        padding: 56px 64px 48px;
        position: relative; overflow: hidden;
    }}

    .bg-layer {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 70% 50% at 50% 0%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 60%),
            linear-gradient(170deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 85%, var(--secondary)) 100%);
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.06; z-index: 0;
    }}

    .headline {{
        font-family: var(--font-heading);
        font-size: clamp(30px, 4.2vw, 40px);
        font-weight: 900; color: var(--text-light);
        text-align: center; line-height: 1.12;
        margin-bottom: 32px; z-index: 2;
    }}

    .comparison-grid {{
        display: flex; flex-direction: row;
        gap: 4px; flex: 1; z-index: 2;
        margin-bottom: 32px;
    }}

    .col-without {{
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden; border-radius: 8px 0 0 8px;
    }}

    .col-with {{
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden; border-radius: 0 8px 8px 0;
    }}

    .col-header-without {{
        background: color-mix(in srgb, #8a2020 80%, var(--primary));
        padding: 16px 24px;
        font-family: var(--font-heading); font-size: 14px;
        font-weight: 800; color: white;
        text-align: center; letter-spacing: 0.12em;
        text-transform: uppercase;
    }}

    .col-header-with {{
        background: var(--accent);
        padding: 16px 24px;
        font-family: var(--font-heading); font-size: 14px;
        font-weight: 800; color: white;
        text-align: center; letter-spacing: 0.12em;
        text-transform: uppercase;
    }}

    .col-body-without {{
        flex: 1;
        background: color-mix(in srgb, #1a0808 85%, var(--primary));
        display: flex; flex-direction: column;
    }}

    .col-body-with {{
        flex: 1;
        background: color-mix(in srgb, var(--primary) 85%, var(--accent));
        display: flex; flex-direction: column;
    }}

    .comp-row {{
        display: flex; align-items: center;
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        font-family: var(--font-body); font-size: 15px;
        font-weight: 400; line-height: 1.4;
        gap: 10px;
    }}

    .comp-row-without {{
        color: rgba(255,255,255,0.4);
    }}
    .comp-row-without::before {{
        content: ""; flex-shrink: 0;
        width: 18px; height: 18px;
        border: 1.5px solid rgba(255,255,255,0.15);
        border-radius: 50%;
    }}

    .comp-row-with {{
        color: rgba(255,255,255,0.9);
        font-weight: 500;
    }}
    .comp-row-with::before {{
        content: ""; flex-shrink: 0;
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--accent);
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 18 18' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 9l3 3 5-5' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    }}

    .bottom-row {{
        display: flex; align-items: center;
        justify-content: center; z-index: 2;
    }}

    .cta-btn {{
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 17px;
        font-weight: 700; padding: 15px 44px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 30%, transparent);
    }}

    .logo-wrap {{
        position: absolute; bottom: 32px; right: 52px; z-index: 3;
    }}
    .logo-wrap img {{
        height: 22px; object-fit: contain; opacity: 0.4;
        filter: brightness(0) invert(1);
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 11px;
        font-weight: 700; color: rgba(255,255,255,0.25);
        letter-spacing: 0.12em; text-transform: uppercase;
    }}
</style>
</head>
<body>
    <div class="bg-layer"></div>
    {hero_image_html}
    <div class="noise"></div>

    <h1 class="headline">{headline}</h1>

    <div class="comparison-grid">
        {comparison_cols_html}
    </div>

    <div class="bottom-row">
        <div class="cta-btn">{cta}</div>
    </div>

    <div class="logo-wrap">
        {logo_html}
    </div>
</body>
</html>
