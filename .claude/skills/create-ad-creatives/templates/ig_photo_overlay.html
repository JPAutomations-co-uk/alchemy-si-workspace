<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        position: relative; overflow: hidden;
        font-family: var(--font-body);
        background: linear-gradient(145deg, var(--primary) 0%, var(--secondary) 100%);
    }}

    .hero-image {{ position: absolute; inset: 0; z-index: 0; }}
    .hero-image img {{
        position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }}

    .gradient-overlay {{
        position: absolute; inset: 0; z-index: 1;
        background: linear-gradient(
            to top,
            rgba(0,0,0,0.88) 0%,
            rgba(0,0,0,0.65) 28%,
            rgba(0,0,0,0.2) 55%,
            rgba(0,0,0,0.05) 80%,
            transparent 100%
        );
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.03; z-index: 2;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none;
    }}

    /* Top accent line */
    .accent-line {{ position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent); z-index: 3; }}

    .logo-wrap {{ position: absolute; top: 48px; left: 64px; z-index: 3; }}
    .logo-wrap img {{ height: 34px; object-fit: contain; filter: brightness(0) invert(1); }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 16px; font-weight: 700;
        color: white; letter-spacing: 0.1em; text-transform: uppercase;
    }}

    .content-block {{
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 64px; z-index: 3;
    }}

    .eyebrow {{
        font-family: var(--font-body); font-size: 12px; font-weight: 500;
        color: var(--accent); letter-spacing: 0.22em; text-transform: uppercase;
        margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }}
    .eyebrow::before {{ content: ""; width: 20px; height: 1.5px; background: var(--accent); }}

    .headline {{
        font-family: var(--font-heading);
        font-size: clamp(40px, 5.5vw, 70px);
        font-weight: 900; color: white;
        line-height: 1.08; max-width: 820px;
        margin-bottom: 20px; letter-spacing: -0.01em;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 21px;
        font-weight: 300; color: rgba(255,255,255,0.7);
        max-width: 600px; line-height: 1.55; margin-bottom: 32px;
    }}

    .cta-btn {{
        display: inline-block; background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 16px;
        font-weight: 700; padding: 16px 44px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 30%, transparent);
    }}
</style>
</head>
<body>
    <div class="hero-image">{hero_image_html}</div>
    <div class="gradient-overlay"></div>
    <div class="noise"></div>
    <div class="accent-line"></div>

    <div class="logo-wrap">{logo_html}</div>

    <div class="content-block">
        <div class="eyebrow">{brand_name}</div>
        <h1 class="headline">{headline}</h1>
        <p class="subheadline">{subheadline}</p>
        <div class="cta-btn">{cta}</div>
    </div>
</body>
</html>
