<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: var(--bg);
        font-family: var(--font-body);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 64px 72px;
        position: relative; overflow: hidden; gap: 36px;
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.04; z-index: 0;
    }}

    /* Soft accent glow */
    .bg-glow {{
        position: absolute;
        width: 500px; height: 300px; border-radius: 50%;
        background: radial-gradient(ellipse, color-mix(in srgb, var(--accent) 7%, transparent) 0%, transparent 70%);
        top: 35%; left: 50%; transform: translateX(-50%);
        pointer-events: none;
    }}

    .eyebrow {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 600;
        color: color-mix(in srgb, var(--text-dark) 40%, transparent);
        letter-spacing: 0.24em; text-transform: uppercase;
        text-align: center; z-index: 2;
        display: flex; align-items: center; gap: 12px;
    }}
    .eyebrow::before, .eyebrow::after {{
        content: ""; width: 20px; height: 1px;
        background: color-mix(in srgb, var(--text-dark) 15%, transparent);
    }}

    .numbers-row {{
        display: flex; align-items: center;
        justify-content: center; gap: 40px;
        z-index: 2; width: 100%;
    }}

    .before-block, .after-block {{
        display: flex; flex-direction: column;
        align-items: center; gap: 6px;
    }}

    .before-label {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 600; color: color-mix(in srgb, var(--text-dark) 35%, transparent);
        letter-spacing: 0.2em; text-transform: uppercase;
    }}

    .after-label {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 600; color: var(--accent);
        letter-spacing: 0.2em; text-transform: uppercase;
    }}

    .before-number {{
        font-family: var(--font-heading);
        font-size: clamp(60px, 9vw, 84px);
        font-weight: 900;
        color: color-mix(in srgb, var(--text-dark) 20%, transparent);
        line-height: 1; letter-spacing: -0.03em;
    }}

    .after-number {{
        font-family: var(--font-heading);
        font-size: clamp(72px, 11vw, 100px);
        font-weight: 900; line-height: 1;
        letter-spacing: -0.03em;
        background: linear-gradient(180deg, var(--accent) 20%, color-mix(in srgb, var(--accent) 60%, white) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 16px color-mix(in srgb, var(--accent) 20%, transparent));
    }}

    .arrow-wrap {{ display: flex; align-items: center; flex-shrink: 0; }}

    .divider-line {{
        width: 72px; height: 1px;
        background: linear-gradient(90deg, color-mix(in srgb, var(--text-dark) 10%, transparent), color-mix(in srgb, var(--text-dark) 10%, transparent));
        z-index: 2;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 19px;
        font-weight: 400; color: var(--text-dark);
        text-align: center; max-width: 600px;
        line-height: 1.5; z-index: 2;
    }}

    .cta-btn {{
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-size: 17px;
        font-weight: 700; padding: 15px 44px; border-radius: 6px;
        letter-spacing: 0.06em; text-transform: uppercase;
        z-index: 2;
        box-shadow: 0 6px 24px color-mix(in srgb, var(--accent) 25%, transparent);
    }}

    .logo-bottom {{
        position: absolute; bottom: 36px; left: 50%;
        transform: translateX(-50%); z-index: 3;
    }}
    .logo-bottom img {{
        height: 24px; object-fit: contain; opacity: 0.3;
    }}
    .brand-name-fallback {{
        font-family: var(--font-heading); font-size: 12px;
        font-weight: 700;
        color: color-mix(in srgb, var(--text-dark) 28%, transparent);
        letter-spacing: 0.1em; text-transform: uppercase;
    }}
</style>
</head>
<body>
    {hero_image_html}
    <div class="noise"></div>
    <div class="bg-glow"></div>

    <div class="eyebrow">Real Results</div>

    <div class="numbers-row">
        <div class="before-block">
            <div class="before-label">Before</div>
            <div class="before-number">{body}</div>
        </div>

        <div class="arrow-wrap">
            <svg width="72" height="32" viewBox="0 0 72 32" fill="none">
                <line x1="0" y1="16" x2="58" y2="16" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
                <polyline points="48,7 62,16 48,25" stroke="var(--accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="after-block">
            <div class="after-label">After</div>
            <div class="after-number">{headline}</div>
        </div>
    </div>

    <div class="divider-line"></div>

    <p class="subheadline">{subheadline}</p>

    <div class="cta-btn">{cta}</div>

    <div class="logo-bottom">
        {logo_html}
    </div>
</body>
</html>
