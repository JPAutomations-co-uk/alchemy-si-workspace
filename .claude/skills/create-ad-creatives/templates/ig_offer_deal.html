<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{ background: #0a0a0a; font-family: var(--font-body); }}

    .ad {{
        width: {width}px; height: {height}px;
        position: relative; overflow: hidden;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center;
    }}

    .bg {{
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 70% 70% at 50% 45%, color-mix(in srgb, var(--accent) 12%, transparent) 0%, transparent 70%),
            radial-gradient(ellipse 100% 80% at 50% 100%, color-mix(in srgb, var(--primary) 30%, black) 0%, transparent 60%),
            linear-gradient(180deg, #0d0d0d 0%, color-mix(in srgb, var(--primary) 15%, #0a0a0a) 100%);
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none; z-index: 1;
    }}

    .stripe {{
        position: absolute; top: -20%; right: -10%;
        width: 45%; height: 140%;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, transparent) 0%, color-mix(in srgb, var(--accent) 3%, transparent) 100%);
        transform: rotate(-15deg); z-index: 1;
    }}

    .ribbon {{
        position: absolute; top: 44px; right: -60px;
        width: 240px; text-align: center; padding: 10px 0;
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-weight: 800;
        font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
        transform: rotate(45deg); z-index: 5;
        box-shadow: 0 4px 20px color-mix(in srgb, var(--accent) 40%, transparent);
    }}

    .content {{
        position: relative; z-index: 3;
        display: flex; flex-direction: column;
        align-items: center; gap: 20px; padding: 0 80px;
    }}

    .eyebrow {{
        font-family: var(--font-body); font-weight: 500;
        font-size: 14px; letter-spacing: 0.25em;
        text-transform: uppercase; color: var(--accent); opacity: 0.9;
    }}

    .headline {{
        font-family: var(--font-heading); font-weight: 900;
        font-size: clamp(72px, 12vw, 130px); color: var(--text-light);
        line-height: 0.95; letter-spacing: -0.04em;
        text-shadow: 0 0 80px color-mix(in srgb, var(--accent) 25%, transparent);
    }}

    .subheadline {{
        font-family: var(--font-body); font-weight: 300;
        font-size: clamp(18px, 2.5vw, 26px);
        color: rgba(255,255,255,0.6); max-width: 540px; line-height: 1.5;
    }}

    .divider {{
        width: 80px; height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        margin: 8px 0;
    }}

    .body {{
        font-family: var(--font-body); font-weight: 400;
        font-size: 18px; color: rgba(255,255,255,0.5);
        max-width: 440px; line-height: 1.5;
    }}

    .cta-btn {{
        display: inline-block; margin-top: 12px;
        background: var(--accent); color: white;
        font-family: var(--font-heading); font-weight: 700;
        font-size: 16px; padding: 16px 52px; border-radius: 6px;
        letter-spacing: 0.08em; text-transform: uppercase;
        box-shadow: 0 8px 32px color-mix(in srgb, var(--accent) 35%, transparent);
    }}

    .logo {{
        position: absolute; bottom: 48px; left: 50%;
        transform: translateX(-50%); height: 32px;
        opacity: 0.5; z-index: 3; filter: brightness(0) invert(1);
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.1; z-index: 0;
    }}
</style>
</head>
<body>
<div class="ad">
    <div class="bg"></div>
    {hero_image_html}
    <div class="noise"></div>
    <div class="stripe"></div>
    <div class="ribbon">LIMITED TIME</div>

    <div class="content">
        <div class="eyebrow">{brand_name}</div>
        <div class="headline">{headline}</div>
        <div class="divider"></div>
        <div class="subheadline">{subheadline}</div>
        <div class="cta-btn">{cta}</div>
    </div>

    {logo_html}
</div>
</body>
</html>
