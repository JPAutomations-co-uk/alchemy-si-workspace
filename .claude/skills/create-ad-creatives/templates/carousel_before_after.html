<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={width}, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@400;600;700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
        :root {{
            --primary: {primary_color};
            --secondary: {secondary_color};
            --accent: {accent_color};
            --text-light: {text_light};
            --text-dark: {text_dark};
            --bg: {bg_color};
            --font-heading: '{heading_font}', 'Inter', sans-serif;
            --font-body: '{body_font}', 'Inter', sans-serif;
        }}
        html, body {{
            width: {width}px;
            height: {height}px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }}
        .slide {{
            width: {width}px;
            height: {height}px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 72px;
            position: relative;
            overflow: hidden;
        }}

        /* === HOOK: SPLIT BEFORE/AFTER === */
        .slide-hook {{
            background: linear-gradient(90deg, #2a2a2a 50%, var(--accent) 50%);
            align-items: center;
            text-align: center;
            padding: 80px 48px;
        }}
        .slide-hook .split-labels {{
            display: flex;
            width: 100%;
            justify-content: space-around;
            margin-bottom: 32px;
        }}
        .slide-hook .split-label {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }}
        .slide-hook .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(44px, 6.5vw, 68px);
            line-height: 1.05;
            color: var(--text-light);
            text-transform: uppercase;
        }}

        /* === BEFORE SLIDE === */
        .slide-before {{
            background: #f0eded;
            align-items: flex-start;
        }}
        .slide-before .tag {{
            display: inline-block;
            padding: 8px 20px;
            background: #dc3545;
            color: white;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 32px;
        }}
        .slide-before .headline {{
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(36px, 5vw, 52px);
            line-height: 1.1;
            color: #333;
            margin-bottom: 20px;
        }}
        .slide-before .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: #666;
        }}

        /* === BRIDGE SLIDE === */
        .slide-bridge {{
            background: var(--primary);
            align-items: center;
            text-align: center;
        }}
        .slide-bridge .headline {{
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(36px, 5.5vw, 56px);
            line-height: 1.15;
            color: var(--text-light);
            margin-bottom: 20px;
        }}
        .slide-bridge .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
        }}

        /* === AFTER SLIDE === */
        .slide-after {{
            background: #f0faf0;
            align-items: flex-start;
        }}
        .slide-after .tag {{
            display: inline-block;
            padding: 8px 20px;
            background: #28a745;
            color: white;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 32px;
        }}
        .slide-after .headline {{
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(36px, 5vw, 52px);
            line-height: 1.1;
            color: #1a472a;
            margin-bottom: 20px;
        }}
        .slide-after .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: #555;
        }}

        /* === CTA SLIDE === */
        .slide-cta {{
            background: var(--accent);
            align-items: center;
            text-align: center;
        }}
        .slide-cta .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(40px, 6vw, 64px);
            line-height: 1.1;
            color: var(--text-light);
            margin-bottom: 24px;
        }}
        .slide-cta .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 40px;
        }}
        .slide-cta .cta-button {{
            display: inline-block;
            padding: 18px 48px;
            border: 2px solid var(--text-light);
            color: var(--text-light);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
        }}

        /* === SHARED === */
        .logo {{ position: absolute; bottom: 40px; right: 48px; height: 28px; opacity: 0.7; }}
        .slide-indicator {{ position: absolute; bottom: 40px; left: 48px; display: flex; gap: 6px; }}
        .slide-indicator .dot {{ width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }}
        .slide-indicator .dot.active {{ background: rgba(255,255,255,0.9); width: 24px; border-radius: 4px; }}
        .slide-before .slide-indicator .dot,
        .slide-after .slide-indicator .dot {{ background: rgba(0,0,0,0.15); }}
        .slide-before .slide-indicator .dot.active {{ background: #dc3545; }}
        .slide-after .slide-indicator .dot.active {{ background: #28a745; }}
    </style>
</head>
<body>
    <div class="slide {slide_class}">
        {slide_content}
    </div>
</body>
</html>
