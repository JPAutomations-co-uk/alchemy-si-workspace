<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{brand_name} — Slide Sequence</title>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@700;800;900&family={body_font_encoded}:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {{
    --primary: {primary_color};
    --secondary: {secondary_color};
    --accent: {accent_color};
    --text-light: {text_light};
    --text-dark: {text_dark};
    --bg: {bg_color};
    --font-heading: '{heading_font}', 'Inter', sans-serif;
    --font-body: '{body_font}', 'Inter', sans-serif;
}}
html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

*, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}

body {{
    background: linear-gradient(145deg, var(--primary) 0%, var(--secondary) 100%);
    position: relative;
    display: flex;
    align-items: stretch;
    font-family: var(--font-body);
    animation: bgDrift 8s ease-in-out infinite alternate;
}}

/* Animated diagonal stripe background */
.bg-stripes {{
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.025) 0px,
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 36px
    );
    background-size: 52px 52px;
    animation: stripesDrift 12s linear infinite;
}}

@keyframes stripesDrift {{
    from {{ background-position: 0 0; }}
    to {{ background-position: 104px 104px; }}
}}

/* Logo top-right */
.logo-corner {{
    position: absolute;
    top: 48px;
    right: 56px;
    z-index: 20;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.2s;
    max-height: 48px;
    display: flex;
    align-items: center;
}}

.logo-corner img {{
    height: 44px;
    width: auto;
    object-fit: contain;
}}

/* Decorative large number — right side background */
.deco-number {{
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%) translateX(120px);
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 320px;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    user-select: none;
    z-index: 1;
    opacity: 0;
    animation: slideFromRight 1s cubic-bezier(0.22,1,0.36,1) forwards 0.5s;
}}

/* Main content area */
.content {{
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px;
    flex: 1;
}}

/* Eyebrow */
.eyebrow {{
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    margin-bottom: 22px;
    opacity: 0;
    animation: slideFromLeft 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.3s;
}}

/* Headline block */
.headline-block {{
    overflow: hidden;
    margin-bottom: 4px;
}}

.headline-1 {{
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 62px;
    color: var(--text-light);
    line-height: 1.0;
    display: block;
    opacity: 0;
    animation: slideFromRight 0.8s cubic-bezier(0.22,1,0.36,1) forwards 0.7s;
}}

.headline-2 {{
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 62px;
    color: var(--accent);
    line-height: 1.05;
    display: block;
    opacity: 0;
    animation: slideFromLeft 0.8s cubic-bezier(0.22,1,0.36,1) forwards 1.1s;
}}

/* Accent bar */
.accent-bar {{
    width: 72px;
    height: 4px;
    background: var(--accent);
    margin: 22px 0;
    transform: scaleX(0);
    transform-origin: left;
    animation: scaleInX 0.6s cubic-bezier(0.22,1,0.36,1) forwards 1.5s;
}}

/* Subheadline */
.subheadline {{
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 20px;
    color: rgba(255,255,255,0.65);
    line-height: 1.55;
    max-width: 360px;
    opacity: 0;
    animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards 1.9s;
}}

/* CTA button */
.cta-btn {{
    display: inline-block;
    margin-top: 30px;
    padding: 15px 38px;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    opacity: 0;
    animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards 2.4s;
}}

/* Keyframes */
@keyframes fadeIn {{
    from {{ opacity: 0; }}
    to {{ opacity: 1; }}
}}

@keyframes slideFromLeft {{
    from {{ opacity: 0; transform: translateX(-100px); }}
    to {{ opacity: 1; transform: translateX(0); }}
}}

@keyframes slideFromRight {{
    from {{ opacity: 0; transform: translateX(120px); }}
    to {{ opacity: 1; transform: translateX(0); }}
}}

@keyframes slideUp {{
    from {{ opacity: 0; transform: translateY(40px); }}
    to {{ opacity: 1; transform: translateY(0); }}
}}

@keyframes scaleInX {{
    from {{ transform: scaleX(0); }}
    to {{ transform: scaleX(1); }}
}}
</style>
</head>
<body>

<div class="bg-stripes"></div>

<!-- Decorative background number -->
<div class="deco-number">01</div>

<!-- Logo top-right -->
<div class="logo-corner">
    {logo_html}
</div>

<!-- Main content -->
<div class="content">
    <div class="eyebrow">// {brand_name}</div>

    <div class="headline-block">
        <span class="headline-1">{headline}</span>
        <span class="headline-2">{subheadline}</span>
    </div>

    <div class="accent-bar"></div>

    <div class="subheadline">{body}</div>

    <button class="cta-btn">{cta}</button>
</div>

</body>
</html>
