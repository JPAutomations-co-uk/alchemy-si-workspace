<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={width}, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@400;600;700;800;900&family={body_font_encoded}:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
        :root {{
            --primary: {primary_color};
            --secondary: {secondary_color};
            --accent: {accent_color};
            --text-light: {text_light};
            --text-dark: {text_dark};
            --bg: {bg_color};
            --font-heading: '{heading_font}', 'Inter', sans-serif;
            --font-body: '{body_font}', 'Inter', sans-serif;
        }}
        html, body {{
            width: {width}px;
            height: {height}px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }}
        .slide {{
            width: {width}px;
            height: {height}px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 72px;
            position: relative;
            overflow: hidden;
        }}

        /* === HOOK: FRAMEWORK TITLE === */
        .slide-hook {{
            background: var(--bg);
            align-items: center;
            text-align: center;
        }}
        .slide-hook .tag {{
            display: inline-block;
            padding: 8px 20px;
            background: var(--accent);
            color: var(--text-light);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 32px;
        }}
        .slide-hook .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(40px, 6vw, 64px);
            line-height: 1.05;
            color: var(--text-dark);
            margin-bottom: 20px;
        }}
        .slide-hook .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: #555;
        }}

        /* === STEP SLIDES === */
        .slide-step {{
            background: var(--bg);
            align-items: flex-start;
        }}
        .slide-step .step-number {{
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }}
        .slide-step .step-circle {{
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 32px;
            color: var(--text-light);
            flex-shrink: 0;
        }}
        .slide-step .step-label {{
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #999;
        }}
        .slide-step .headline {{
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(36px, 5vw, 52px);
            line-height: 1.1;
            color: var(--text-dark);
            margin-bottom: 20px;
        }}
        .slide-step .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: #555;
        }}
        .slide-step .divider {{
            width: 100%;
            height: 1px;
            background: rgba(0, 0, 0, 0.08);
            margin-top: 40px;
        }}

        /* === CTA SLIDE === */
        .slide-cta {{
            background: var(--primary);
            align-items: center;
            text-align: center;
        }}
        .slide-cta .headline {{
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(36px, 5.5vw, 56px);
            line-height: 1.1;
            color: var(--text-light);
            margin-bottom: 24px;
        }}
        .slide-cta .body {{
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(18px, 2.5vw, 24px);
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 40px;
        }}
        .slide-cta .cta-button {{
            display: inline-block;
            padding: 18px 48px;
            background: var(--accent);
            color: var(--text-light);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
            border: none;
        }}

        /* === SHARED === */
        .logo {{ position: absolute; bottom: 40px; right: 48px; height: 28px; opacity: 0.7; }}
        .slide-indicator {{ position: absolute; bottom: 40px; left: 48px; display: flex; gap: 6px; }}
        .slide-indicator .dot {{ width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.15); }}
        .slide-indicator .dot.active {{ background: var(--accent); width: 24px; border-radius: 4px; }}
        .slide-cta .slide-indicator .dot {{ background: rgba(255,255,255,0.3); }}
        .slide-cta .slide-indicator .dot.active {{ background: var(--accent); }}
    </style>
</head>
<body>
    <div class="slide {slide_class}">
        {slide_content}
    </div>
</body>
</html>
