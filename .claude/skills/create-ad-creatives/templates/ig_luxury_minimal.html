<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family={heading_font_encoded}:wght@300;400;500;700;800&family={body_font_encoded}:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after {{ margin: 0; padding: 0; box-sizing: border-box; }}
    :root {{
        --primary: {primary_color};
        --secondary: {secondary_color};
        --accent: {accent_color};
        --text-light: {text_light};
        --text-dark: {text_dark};
        --bg: {bg_color};
        --font-heading: '{heading_font}', 'Inter', sans-serif;
        --font-body: '{body_font}', 'Inter', sans-serif;
    }}
    html, body {{ width: {width}px; height: {height}px; overflow: hidden; -webkit-font-smoothing: antialiased; }}

    body {{
        background: #f8f7f4;
        font-family: var(--font-body);
        position: relative; overflow: hidden;
    }}

    .noise {{
        position: absolute; inset: 0; opacity: 0.015;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px; pointer-events: none;
    }}

    /* Thin border frame inside edges */
    .frame {{
        position: absolute; inset: 36px;
        border: 1px solid color-mix(in srgb, var(--text-dark) 8%, transparent);
        z-index: 1; pointer-events: none;
    }}

    .layout {{
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        padding: 80px 100px; z-index: 2;
    }}

    .top-bar {{
        display: flex; align-items: center; gap: 20px;
        margin-bottom: auto;
    }}
    .accent-dash {{
        width: 32px; height: 1px; background: var(--accent);
    }}
    .brand-area {{ display: flex; align-items: center; }}
    .brand-area img {{ height: 26px; object-fit: contain; }}
    .brand-name-small {{
        font-family: var(--font-body); font-size: 12px;
        font-weight: 500; color: color-mix(in srgb, var(--text-dark) 40%, transparent);
        letter-spacing: 0.2em; text-transform: uppercase;
    }}

    .mid-content {{
        display: flex; flex-direction: column;
        justify-content: center; flex: 1; padding: 48px 0;
    }}

    .headline {{
        font-family: var(--font-heading); font-size: clamp(38px, 5vw, 48px);
        font-weight: 300; color: var(--text-dark);
        line-height: 1.25; letter-spacing: 0.015em;
        max-width: 720px; margin-bottom: 24px;
    }}

    .subheadline {{
        font-family: var(--font-body); font-size: 17px;
        font-weight: 400; color: #8a8a8a;
        max-width: 520px; line-height: 1.65; margin-bottom: 44px;
    }}

    .cta-link {{
        display: flex; align-items: center; gap: 14px;
        font-family: var(--font-body); font-size: 14px;
        font-weight: 500; color: var(--accent);
        letter-spacing: 0.1em; text-transform: uppercase;
    }}
    .cta-link svg {{ flex-shrink: 0; }}

    .bottom-area {{
        display: flex; align-items: flex-end; justify-content: space-between;
    }}
    .bottom-brand {{
        font-family: var(--font-body); font-size: 11px;
        font-weight: 500; color: #b0b0b0;
        letter-spacing: 0.2em; text-transform: uppercase;
    }}

    .hero-img {{
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.06; z-index: 0;
    }}
</style>
</head>
<body>
    {hero_image_html}
    <div class="noise"></div>
    <div class="frame"></div>

    <div class="layout">
        <div class="top-bar">
            <div class="accent-dash"></div>
            <div class="brand-area">{logo_html}</div>
        </div>

        <div class="mid-content">
            <h1 class="headline">{headline}</h1>
            <p class="subheadline">{subheadline}</p>
            <div class="cta-link">
                <span>{cta}</span>
                <svg width="32" height="12" viewBox="0 0 32 12" fill="none">
                    <line x1="0" y1="6" x2="28" y2="6" stroke="{accent_color}" stroke-width="1"/>
                    <polyline points="22,1 28,6 22,11" stroke="{accent_color}" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-brand">{brand_name}</div>
        </div>
    </div>
</body>
</html>
